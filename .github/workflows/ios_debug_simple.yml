name: iOS Debug Build Simple

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Build iOS Debug
      uses: touchlab/kmp-build-ios-app@v1.0.2
      with:
        project-path: 'iosApp'
        scheme: 'iosApp'
        configuration: 'Debug'
        export-method: 'development'
        
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: ios-debug-app
        path: '*.ipa'