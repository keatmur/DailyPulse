name: Build iOS IPA for BrowserStack (Educational)

on:
  workflow_dispatch:  # Ручной запуск для тестирования
  push:
    branches: [ 1_initial ]
    paths:
      - 'iosApp/**'
      - 'shared/**'

jobs:
  build-ios-ipa:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
        
    - name: Make gradlew executable
      run: chmod +x ./gradlew
      
    # Сборка shared framework для iOS (используем embedAndSignAppleFrameworkForXcode)
    - name: Build Shared Framework for iOS
      run: ./gradlew :shared:embedAndSignAppleFrameworkForXcode
      env:
        CONFIGURATION: Debug
        SDK_NAME: iphonesimulator
        ARCHS: arm64
        TARGET_BUILD_DIR: ${{ github.workspace }}/iosApp/build/Debug-iphonesimulator
        FRAMEWORKS_FOLDER_PATH: iosApp.app/Frameworks
        EXPANDED_CODE_SIGN_IDENTITY: ""
        EXPANDED_CODE_SIGN_IDENTITY_NAME: ""
      
    # Сборка iOS приложения для симулятора
    - name: Build iOS App for Simulator
      run: |
        cd iosApp
        
        # Очищаем предыдущие сборки
        rm -rf build/
        rm -f iosApp-simulator.ipa
        
        # Собираем приложение для симулятора
        xcodebuild -project iosApp.xcodeproj \
                   -scheme iosApp \
                   -destination 'platform=iOS Simulator,name=iPhone 15' \
                   -configuration Debug \
                   -derivedDataPath ./build \
                   CODE_SIGN_IDENTITY="" \
                   CODE_SIGNING_REQUIRED=NO \
                   clean build
    
    # Создание .ipa файла
    - name: Create IPA for BrowserStack
      run: |
        cd iosApp
        
        echo "🔍 Поиск собранного приложения..."
        APP_PATH=$(find ./build -name "*.app" -type d | head -1)
        
        if [ -z "$APP_PATH" ]; then
            echo "❌ Ошибка: Не найдено собранное приложение"
            find ./build -name "*.app" -type d
            exit 1
        fi
        
        echo "✅ Найдено приложение: $APP_PATH"
        
        # Создаем структуру Payload для .ipa
        rm -rf Payload
        mkdir -p Payload
        
        # Копируем .app в Payload
        cp -R "$APP_PATH" Payload/
        
        # Создаем .ipa файл
        zip -r iosApp-simulator.ipa Payload/
        
        # Очищаем временные файлы
        rm -rf Payload
        
        # Проверяем результат
        if [ -f "iosApp-simulator.ipa" ]; then
            FILE_SIZE=$(ls -lh iosApp-simulator.ipa | awk '{print $5}')
            echo "✅ .ipa файл создан успешно!"
            echo "📄 Размер файла: $FILE_SIZE"
        else
            echo "❌ Ошибка создания .ipa файла"
            exit 1
        fi
        
    # Загрузка .ipa файла для скачивания
    - name: Upload IPA for BrowserStack Testing
      uses: actions/upload-artifact@v4
      with:
        name: ios-simulator-ipa
        path: iosApp/iosApp-simulator.ipa
        retention-days: 7  # Для учебного проекта достаточно недели
