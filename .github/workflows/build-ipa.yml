name: Build iOS IPA for BrowserStack (Educational)

on:
  workflow_dispatch:  # Ручной запуск для тестирования
    inputs:
      debug:
        description: 'Enable debug mode'
        required: false
        default: 'false'
  push:
    branches: [ 1_initial ]
    paths:
      - 'iosApp/**'
      - 'shared/**'
      - '.github/workflows/**'

jobs:
  build-ios-ipa:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2

    - name: Make scripts executable
      run: |
        chmod +x ./gradlew
        if [ -f "./scripts/build-ipa-simulator.sh" ]; then
          chmod +x ./scripts/build-ipa-simulator.sh
          echo "✅ Script found and made executable"
        else
          echo "❌ Script not found at ./scripts/build-ipa-simulator.sh"
          echo "Available files:"
          find . -name "*.sh" -type f
          exit 1
        fi

    - name: Debug - Check environment
      run: |
        echo "🔍 Проверяем окружение..."
        echo "Current directory: $(pwd)"
        echo "Available files:"
        ls -la
        echo "Scripts directory:"
        ls -la scripts/
        echo "Xcode version:"
        xcodebuild -version
        echo "Available simulators:"
        xcrun simctl list devices | grep iPhone

    # Используем наш скрипт для сборки .ipa
    - name: Build IPA using script
      run: |
        if [ -f "./scripts/build-ipa-simulator.sh" ]; then
          echo "🚀 Запускаем скрипт сборки..."
          ./scripts/build-ipa-simulator.sh
        else
          echo "⚠️ Скрипт не найден, выполняем сборку напрямую..."

          # Fallback: выполняем сборку напрямую
          export CONFIGURATION=Debug
          export SDK_NAME=iphonesimulator
          export ARCHS=arm64

          echo "📦 Собираем shared framework..."
          ./gradlew :shared:embedAndSignAppleFrameworkForXcode

          echo "🔨 Собираем iOS приложение..."
          cd iosApp
          xcodebuild -project iosApp.xcodeproj \
                     -scheme iosApp \
                     -destination 'platform=iOS Simulator,name=iPhone 15' \
                     -configuration Debug \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGNING_REQUIRED=NO \
                     build

          echo "📦 Создаем .ipa файл..."
          APP_PATH=$(find . -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            mkdir -p Payload
            cp -R "$APP_PATH" Payload/
            zip -r iosApp-simulator.ipa Payload/
            rm -rf Payload
            echo "✅ .ipa файл создан: $(ls -lh iosApp-simulator.ipa)"
          else
            echo "❌ Не найдено .app файла"
            exit 1
          fi
        fi
        
    # Загрузка .ipa файла для скачивания
    - name: Upload IPA for BrowserStack Testing
      uses: actions/upload-artifact@v4
      with:
        name: ios-simulator-ipa
        path: iosApp/iosApp-simulator.ipa
        retention-days: 7  # Для учебного проекта достаточно недели
